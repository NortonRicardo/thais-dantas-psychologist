name: thais-dantas
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: thais-dantas
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./bun.lock:/app/bun.lock
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./components.json:/app/components.json
      - ./drizzle.config.ts:/app/drizzle.config.ts
      - ./drizzle:/app/drizzle
    command: sh -c "bun db:migrate && bun run dev"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: 'true'
      DATABASE_URL: postgres://thais_dantas:thais_dantas@db:5432/thais_dantas
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: thais-dantas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: thais_dantas
      POSTGRES_PASSWORD: thais_dantas
      POSTGRES_DB: thais_dantas
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thais_dantas -d thais_dantas']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  pg_data:

networks:
  app-network:
    driver: bridge
